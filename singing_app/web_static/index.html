<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Singing Video Web</title>
  <style>
    :root { color-scheme: dark; font-family: "Segoe UI", Arial, sans-serif; }
    body { margin: 0; background: #101217; color: #eef2ff; }
    header { padding: 20px 28px; background: #171b24; border-bottom: 1px solid #2b3140; }
    h1 { margin: 0 0 6px; font-size: 24px; }
    main { display: grid; grid-template-columns: 390px 1fr; gap: 18px; padding: 18px; }
    section { background: #171b24; border: 1px solid #2b3140; border-radius: 12px; padding: 16px; }
    h2 { margin: 0 0 12px; font-size: 17px; }
    h3 { margin: 16px 0 8px; font-size: 14px; color: #aab6d3; }
    label { display: block; margin: 9px 0 4px; color: #cdd6ef; font-size: 13px; }
    input, select, textarea { box-sizing: border-box; width: 100%; padding: 9px; border-radius: 8px; border: 1px solid #3a4255; background: #0f131b; color: #eef2ff; }
    textarea { min-height: 76px; resize: vertical; }
    button { margin: 10px 8px 0 0; padding: 9px 13px; border: 0; border-radius: 8px; background: #4f7cff; color: white; cursor: pointer; }
    button.secondary { background: #30384a; }
    button.danger { background: #a85555; }
    pre { overflow: auto; max-height: 340px; padding: 12px; border-radius: 8px; background: #0c0f15; border: 1px solid #2b3140; white-space: pre-wrap; }
    .tabs { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .tab { background: #30384a; }
    .tab.active { background: #4f7cff; }
    .panel { display: none; }
    .panel.active { display: block; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .ok { color: #74d99f; }
    .bad { color: #ff8b8b; }
    .muted { color: #94a3b8; }
    @media (max-width: 980px) { main { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <h1>AI Singing Video Web</h1>
    <div class="muted">本地浏览器调试版，复用同一个 harness，不需要桌面 UI。</div>
  </header>
  <main>
    <section>
      <div class="tabs">
        <button class="tab active" data-panel="video">唱歌视频</button>
        <button class="tab" data-panel="voice">生成声线样本</button>
        <button class="tab" data-panel="train">训练模型</button>
      </div>

      <div id="video" class="panel active">
        <h2>创建唱歌视频 Job</h2>
        <label>角色名</label><input id="video_character_name">
        <label>声线描述</label><textarea id="video_voice_description"></textarea>
        <label>歌曲路径</label><input id="song_path">
        <label>角色图片路径</label><input id="character_image">
        <label>RVC 模型 .pth</label><input id="model_path">
        <label>RVC 索引 .index</label><input id="index_path">
        <div class="grid">
          <div><label>开始秒数</label><input id="start_seconds" type="number" value="0"></div>
          <div><label>时长秒数</label><input id="duration_seconds" type="number" value="30"></div>
        </div>
        <button onclick="createVideoJob()">创建 Job</button>
        <button onclick="createVideoJob(true)">创建并运行</button>
      </div>

      <div id="voice" class="panel">
        <h2>生成声线样本 Job</h2>
        <label>角色名</label><input id="voice_character_name">
        <label>声线描述</label><textarea id="voice_description"></textarea>
        <label>角色图片路径</label><input id="voice_character_image">
        <label>TTS voice</label><input id="tts_voice" value="zh-CN-YunxiNeural">
        <button onclick="createVoiceJob()">创建 Job</button>
        <button onclick="createVoiceJob(true)">创建并运行</button>
      </div>

      <div id="train" class="panel">
        <h2>训练模型 Job</h2>
        <label>角色名</label><input id="train_character_name">
        <label>模型名</label><input id="train_model_name" value="demo_character_voice">
        <label>样本目录</label><input id="sample_dir">
        <label>Epochs</label><input id="epochs" type="number" value="5">
        <button onclick="createTrainingJob()">创建 Job</button>
        <button class="danger" onclick="createTrainingJob(true)">创建并运行训练</button>
      </div>

      <h3>运行控制</h3>
      <label>当前 Job</label>
      <select id="job_select"></select>
      <input id="job_path">
      <label><input id="dry_run" type="checkbox" checked style="width:auto"> Dry run</label>
      <label><input id="no_resume" type="checkbox" style="width:auto"> 从第一步重跑</label>
      <button onclick="runJob()">运行当前 Job</button>
      <button class="secondary" onclick="refreshAll()">刷新状态</button>
      <button class="secondary" onclick="openOutput()">打开输出目录</button>
    </section>

    <section>
      <div class="grid">
        <div>
          <h2>Runtime Check</h2>
          <button class="secondary" onclick="loadRuntime()">检查运行时</button>
          <pre id="runtime"></pre>
        </div>
        <div>
          <h2>Runner</h2>
          <pre id="runner"></pre>
        </div>
      </div>
      <h2>State</h2>
      <pre id="state"></pre>
      <h2>Artifacts</h2>
      <pre id="artifacts"></pre>
      <h2>Logs</h2>
      <pre id="logs"></pre>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);

    async function api(path, options = {}) {
      const res = await fetch(path, options);
      const data = await res.json();
      if (!res.ok || data.error) throw new Error(data.error || res.statusText);
      return data;
    }

    function post(path, payload) {
      return api(path, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
    }

    function payload(ids) {
      const out = {};
      for (const id of ids) out[id] = $(id).value;
      return out;
    }

    function setJob(path) {
      $("job_path").value = path;
      refreshStatus();
      loadJobs();
    }

    async function loadDefaults() {
      const d = await api("/api/defaults");
      $("video_character_name").value = d.default_character_name;
      $("voice_character_name").value = d.default_character_name;
      $("train_character_name").value = d.default_character_name;
      $("video_voice_description").value = d.default_voice_description;
      $("voice_description").value = d.default_voice_description;
      $("song_path").value = d.default_song;
      $("character_image").value = d.default_character_image;
      $("voice_character_image").value = d.default_character_image;
      $("model_path").value = d.default_model;
      $("index_path").value = d.default_index;
      $("sample_dir").value = d.default_sample_dir;
      $("job_path").value = d.default_job;
    }

    async function loadJobs() {
      const data = await api("/api/jobs");
      const select = $("job_select");
      const current = $("job_path").value;
      select.innerHTML = "";
      for (const job of data.jobs) {
        const option = document.createElement("option");
        option.value = job.path;
        option.textContent = job.label;
        if (job.path === current) option.selected = true;
        select.appendChild(option);
      }
    }

    async function loadRuntime() {
      const data = await api("/api/runtime");
      $("runtime").innerHTML = data.checks.map(c => `${c.ok ? "OK" : "MISSING"}  ${c.name} - ${c.message}\n${c.path}`).join("\n\n");
      $("runtime").className = data.checks.every(c => c.ok) ? "ok" : "bad";
    }

    async function refreshStatus() {
      const data = await api(`/api/status?job_path=${encodeURIComponent($("job_path").value)}`);
      $("runner").textContent = JSON.stringify(data.runner, null, 2);
      $("state").textContent = JSON.stringify(data.state, null, 2);
      $("artifacts").textContent = JSON.stringify(data.artifacts, null, 2);
      $("logs").textContent = (data.logs || []).map(l => `== ${l.name} ==\n${l.text}`).join("\n\n");
    }

    async function refreshAll() {
      await Promise.all([loadJobs(), loadRuntime(), refreshStatus()]);
    }

    async function createVideoJob(run = false) {
      const data = payload(["song_path", "character_image", "model_path", "index_path", "start_seconds", "duration_seconds"]);
      data.character_name = $("video_character_name").value;
      data.voice_description = $("video_voice_description").value;
      const result = await post("/api/create-video-job", data);
      setJob(result.job_path);
      if (run) await runJob();
    }

    async function createVoiceJob(run = false) {
      const result = await post("/api/create-voice-job", {
        character_name: $("voice_character_name").value,
        voice_description: $("voice_description").value,
        character_image: $("voice_character_image").value,
        tts_voice: $("tts_voice").value
      });
      setJob(result.job_path);
      if (run) await runJob();
    }

    async function createTrainingJob(run = false) {
      const result = await post("/api/create-training-job", {
        character_name: $("train_character_name").value,
        model_name: $("train_model_name").value,
        sample_dir: $("sample_dir").value,
        epochs: $("epochs").value
      });
      setJob(result.job_path);
      if (run) await runJob();
    }

    async function runJob() {
      const data = await post("/api/run-job", {
        job_path: $("job_path").value,
        dry_run: $("dry_run").checked,
        no_resume: $("no_resume").checked
      });
      $("runner").textContent = JSON.stringify(data, null, 2);
      setTimeout(refreshStatus, 500);
    }

    async function openOutput() {
      await api(`/api/open-output?job_path=${encodeURIComponent($("job_path").value)}`);
    }

    document.querySelectorAll(".tab").forEach(button => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".tab,.panel").forEach(el => el.classList.remove("active"));
        button.classList.add("active");
        $(button.dataset.panel).classList.add("active");
      });
    });
    $("job_select").addEventListener("change", () => setJob($("job_select").value));
    $("job_path").addEventListener("change", refreshStatus);

    loadDefaults().then(refreshAll).catch(err => alert(err.message));
    setInterval(refreshStatus, 3000);
  </script>
</body>
</html>
